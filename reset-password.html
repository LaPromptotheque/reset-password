<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialisation du mot de passe — Promptothèque</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #1a1a1a;
      color: #e2e2e2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      color: #e2e2e2;
      margin-bottom: 4px;
    }

    h2 {
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      color: #888;
    }

    .field input {
      width: 100%;
      padding: 10px 13px;
      background: #242424;
      border: 1px solid #333;
      border-radius: 5px;
      color: #e2e2e2;
      font-size: 14px;
      outline: none;
      transition: border-color 0.14s;
    }
    .field input:focus { border-color: #7c6af5; }
    .field input::placeholder { color: #505050; }

    button {
      width: 100%;
      padding: 10px 16px;
      background: #7c6af5;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.14s;
    }
    button:hover { filter: brightness(1.12); }
    button:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }

    .msg {
      font-size: 13px;
      padding: 10px 13px;
      border-radius: 5px;
      line-height: 1.4;
      display: none;
    }
    .msg.visible { display: block; }
    .msg-error   { background: rgba(224,85,85,0.12); color: #e07777; border: 1px solid rgba(224,85,85,0.25); }
    .msg-success { background: rgba(76,175,130,0.12); color: #5cba90; border: 1px solid rgba(76,175,130,0.25); }

    .hidden { display: none !important; }

    .loading {
      text-align: center;
      color: #555;
      font-size: 13px;
      padding: 8px 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="brand">Promptothèque</p>
    <h2>Choisissez un nouveau mot de passe</h2>

    <!-- Pendant la vérification du token -->
    <div id="loading-section" class="loading">Vérification du lien…</div>

    <!-- Formulaire (affiché après vérification réussie) -->
    <div id="form-section" class="hidden">
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="field">
          <input type="password" id="new-pw" placeholder="Nouveau mot de passe" autocomplete="new-password">
        </div>
        <div class="field">
          <input type="password" id="confirm-pw" placeholder="Confirmer le mot de passe" autocomplete="new-password">
        </div>
        <div id="msg" class="msg"></div>
        <button id="submit-btn">Enregistrer le mot de passe</button>
      </div>
    </div>

    <!-- Succès -->
    <div id="success-section" class="hidden" style="display:flex;flex-direction:column;gap:12px;text-align:center;">
      <div class="msg msg-success visible">Mot de passe mis à jour avec succès.</div>
      <p style="font-size:12px;color:#888;">Vous pouvez fermer cette page et vous connecter depuis l'extension.</p>
    </div>

    <!-- Erreur token invalide/expiré -->
    <div id="error-section" class="hidden" style="text-align:center;">
      <div class="msg msg-error visible">Ce lien est invalide ou a expiré.<br>Demandez un nouveau lien depuis l'extension.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL     = 'https://flepttsxjxjfjwknyzjk.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsZXB0dHN4anhqZmp3a255emprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODQwMDIsImV4cCI6MjA5Mjk2MDAwMn0.oxUm3ZvQPxn2l-bjWs-3_n82xQZ4vr1JTVk3Oz7zRuo'

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { detectSessionInUrl: true, autoRefreshToken: false, persistSession: false }
    })

    const loadingSection = document.getElementById('loading-section')
    const formSection    = document.getElementById('form-section')
    const successSection = document.getElementById('success-section')
    const errorSection   = document.getElementById('error-section')
    const msgEl          = document.getElementById('msg')
    const submitBtn      = document.getElementById('submit-btn')

    function showForm() {
      loadingSection.classList.add('hidden')
      formSection.classList.remove('hidden')
    }

    function showError() {
      loadingSection.classList.add('hidden')
      errorSection.classList.remove('hidden')
    }

    function showMsg(text, type) {
      msgEl.textContent = text
      msgEl.className = `msg msg-${type} visible`
    }

    // ── Écouter l'événement PASSWORD_RECOVERY de Supabase ────────
    // Supabase v2 émet cet événement automatiquement quand il
    // détecte un token de récupération valide dans l'URL
    // (qu'il soit en hash #access_token=... ou en query ?token_hash=...)
    client.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showForm()
        clearTimeout(fallbackTimer)
      }
    })

    // Fallback : si aucun événement dans 4 secondes → lien invalide
    const fallbackTimer = setTimeout(showError, 4000)

    // ── Soumission du formulaire ──────────────────────────────────
    submitBtn.addEventListener('click', handleSubmit)
    document.getElementById('confirm-pw').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSubmit()
    })

    async function handleSubmit() {
      const pw  = document.getElementById('new-pw').value
      const pw2 = document.getElementById('confirm-pw').value
      msgEl.className = 'msg'

      if (!pw || !pw2) { showMsg('Veuillez remplir les deux champs.', 'error'); return }
      if (pw !== pw2)  { showMsg('Les mots de passe ne correspondent pas.', 'error'); return }
      if (pw.length < 6) { showMsg('Minimum 6 caractères requis.', 'error'); return }

      submitBtn.disabled = true
      submitBtn.textContent = 'Enregistrement…'

      const { error } = await client.auth.updateUser({ password: pw })

      if (error) {
        showMsg('Erreur : ' + error.message, 'error')
        submitBtn.disabled = false
        submitBtn.textContent = 'Enregistrer le mot de passe'
      } else {
        formSection.classList.add('hidden')
        successSection.classList.remove('hidden')
      }
    }
  </script>

</body>
</html>
